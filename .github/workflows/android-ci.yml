name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: Debug build and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check whitespace on pull request
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"

      - name: Check whitespace on push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: |
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"
          if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            git diff --check "${BEFORE}..${SHA}"
          else
            git diff-tree --check --no-commit-id -r "${SHA}"
          fi

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
