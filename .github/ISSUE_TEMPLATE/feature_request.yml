name: Feature request
description: Suggest a PaykiTodo feature or UX improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
      placeholder: "When I ..., I need ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional.
  - type: dropdown
    id: area
    attributes:
      label: Related area
      options:
        - Daily board
        - Todos / DDL
        - Calendar / events
        - Reminders / alarms
        - Planning Desk
        - Desktop sync / Web UI
        - Widgets
        - AI features
        - Backup / restore
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include private schedule data, API keys, tokens, backups, signing material, or private Base URLs.
          required: true
